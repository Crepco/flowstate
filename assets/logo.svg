<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="300" y1="30" x2="300" y2="570" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#18181c"/>
      <stop offset="1" stop-color="#0b0b0d"/>
    </linearGradient>
    <radialGradient id="topglow" cx="300" cy="150" r="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tan" x1="130" y1="470" x2="470" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b07f56"/>
      <stop offset="1" stop-color="#e6c4a4"/>
    </linearGradient>
    <filter id="glowTan" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#cca080" flood-opacity="0.55"/>
    </filter>
    <filter id="glowWhite" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#ffffff" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- app tile -->
  <rect x="0" y="0" width="600" height="600" rx="132" fill="url(#bg)"/>
  <rect x="0" y="0" width="600" height="600" rx="132" fill="url(#topglow)"/>
  <rect x="1.5" y="1.5" width="597" height="597" rx="130.5" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="3"/>

  <!-- focus dial -->
  <circle cx="300" cy="300" r="170" fill="none" stroke="#cca080" stroke-opacity="0.14" stroke-width="18"/>
  <circle cx="300" cy="300" r="170" fill="none" stroke="url(#tan)" stroke-width="18"
          stroke-linecap="round" stroke-dasharray="769 1069" transform="rotate(-90 300 300)" filter="url(#glowTan)"/>
  <circle cx="133" cy="332" r="7" fill="#f4ece2"/>

  <!-- EEG pulse -->
  <path d="M150 300 H230 L250 280 L268 300 L292 300 L304 200 L316 400 L330 262 L348 300 L372 300 L392 285 L412 300 H450"
        fill="none" stroke="#f2ede6" stroke-width="13" stroke-linejoin="round" stroke-linecap="round" filter="url(#glowWhite)"/>
</svg>
